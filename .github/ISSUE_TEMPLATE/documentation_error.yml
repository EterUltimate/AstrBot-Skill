name: 文档错误反馈
description: 发现文档中的知识性错误或过时的信息。
title: "【文档错误】: "
labels: ["bug", "documentation"]
body:
  - type: textarea
    id: error-description
    attributes:
      label: 错误描述
      description: 请详细描述文档中存在的错误。
      placeholder: 例如：在某某章节中，关于某某功能的描述是不准确的。
    validations:
      required: true
  - type: input
    id: doc-link
    attributes:
      label: 文档链接
      description: 存在错误的文档页面链接。
      placeholder: https://docs.astrbot.com/...
    validations:
      required: true
  - type: textarea
    id: suggested-fix
    attributes:
      label: 建议修改
      description: 如果你知道正确的信息，请提供修改建议。
      placeholder: 应该修改为...
  - type: textarea
    id: additional-context
    attributes:
      label: 补充信息
      description: 任何其他可以帮助我们理解或修复错误的背景信息。
