name: 改进建议 (CodeAgent 使用体验)
description: 针对 AstrBot 或文档的改进建议，特别是关于 CodeAgent 使用不顺的地方。
title: "【建议】: "
labels: ["enhancement"]
body:
  - type: textarea
    id: feedback-context
    attributes:
      label: 使用场景
      description: 您在什么场景下使用了 CodeAgent？
      placeholder: 例如：正在尝试编写一个自动回复插件...
    validations:
      required: true
  - type: textarea
    id: issue-details
    attributes:
      label: 不顺手的地方
      description: 请详细说明在使用过程中遇到的困难或觉得不合理的地方。
      placeholder: 例如：CodeAgent 在解析某些 API 时经常报错，或者文档对于某部分的指引不够清晰。
    validations:
      required: true
  - type: textarea
    id: suggested-improvement
    attributes:
      label: 改进建议
      description: 您希望如何改进？
      placeholder: 如果能增加某某示例，或者调整某某逻辑，会更好。
    validations:
      required: true
  - type: textarea
    id: additional-info
    attributes:
      label: 补充信息
      description: 截屏、日志或其他相关信息。
