name: Auto Sync Docs

on:
  schedule:
    - cron: "0 */6 * * *" # 每 6 小时触发一次
  workflow_dispatch: # 支持手动触发
    inputs:
      force_latest:
        description: 'Force sync with the latest commit'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run sync script
        id: sync_script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_BASE: ${{ secrets.OPENAI_API_BASE }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BASE_URL: ${{ secrets.BASE_URL }}
          MODEL_NAME: ${{ secrets.MODEL_NAME }}
          # HTTPS_PROXY: "http://your-proxy-host:port" # 如果您的 API 无法从 GitHub Action 所在的海外环境访问，请配置代理，或者换用具备全球访问能力的 API 聚合站
        run: |
          if [ "${{ inputs.force_latest }}" = "true" ]; then
            python scripts/main.py --force-latest
          else
            python scripts/main.py
          fi

      - name: Set branch name
        if: steps.sync_script.outputs.has_updates == 'true'
        id: vars
        run: echo "branch=auto-doc-update-$(date +'%Y%m%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        if: steps.sync_script.outputs.has_updates == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ steps.vars.outputs.branch }}
          title: ${{ steps.sync_script.outputs.pr_title }}
          body: ${{ steps.sync_script.outputs.pr_body }}
          labels: auto-generated
          commit-message: "docs: automated sync from main repo"
          base: ${{ github.ref_name }} # 确保指向当前运行的分支
