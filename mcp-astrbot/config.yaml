# AstrBot MCP Server Configuration
name: astrbot-mcp
description: MCP server for AstrBot plugin development
version: 1.0.0

# Server settings
server:
  transport: stdio  # stdio or sse

# Tool settings
tools:
  # Document tools
  docs:
    base_path: ../skill-astrbot-dev/references

  # Hook inventory generator
  hooks:
    generator_script: ../scripts/generate_hook_inventory.py
    output_path: ../skill-astrbot-dev/.tmp/hook_inventory

# Optional: SSE transport settings
sse:
  host: localhost
  port: 3000
  path: /mcp
